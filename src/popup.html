<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>EID Sniffer</title>
  </head>
  <body>
    <header class="header">
      <span class="logo">EID</span>
      <div class="title">
        <h1>EID Sniffer</h1>
      </div>
      <a
        class="github"
        href="https://github.com/sjangle-godaddy/eid-sniffer"
        target="_blank"
        rel="noreferrer"
        title="View on GitHub"
        aria-label="View on GitHub"
      >
        <svg viewBox="0 0 16 16" width="18" height="18" aria-hidden="true">
          <path
            fill="currentColor"
            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"
          />
        </svg>
      </a>
    </header>

    <label class="row row--main">
      <span class="switch">
        <input type="checkbox" id="active" />
        <span class="slider"></span>
      </span>
      <span class="row-label">
        <strong id="activateLabel" class="activate-label activate-label--off">Activate</strong>
      </span>
    </label>

    <section class="group">
      <h2 class="group-title">Track</h2>
      <label class="check">
        <input type="checkbox" id="trackCollect" />
        <span><code>/csp/collect</code></span>
      </label>
      <label class="check">
        <input type="checkbox" id="trackWeb" />
        <span><code>/eventbus/web</code></span>
      </label>
    </section>

    <section class="group">
      <h2 class="group-title">Output style</h2>
      <label class="check">
        <input type="checkbox" id="styleConsole" />
        <span>Print to Console</span>
      </label>
      <label class="check">
        <input type="checkbox" id="styleToast" />
        <span>On-page toast popup</span>
      </label>
    </section>

    <section class="group">
      <h2 class="group-title">Options</h2>

      <div class="option">
        <label for="popupTimeout">Popup Timeout (s)</label>
        <select id="popupTimeout" class="select">
          <option value="3">3</option>
          <option value="6">6</option>
          <option value="8">8</option>
          <option value="10">10</option>
          <option value="15">15</option>
          <option value="20">20</option>
          <option value="30">30</option>
        </select>
      </div>

      <div class="option">
        <label for="copyMode">Copy Behaviour</label>
        <select id="copyMode" class="select">
          <option value="eid">EID only</option>
          <option value="eidProps">EID with customProperty</option>
        </select>
      </div>

      <div class="option">
        <label for="theme">Theme</label>
        <select id="theme" class="select">
          <option value="glass">Glass</option>
          <option value="dracula">Dracula</option>
        </select>
      </div>

      <div class="option">
        <span class="option-label">Domain Whitelist</span>
        <a id="openOptions" class="option-action" href="#">Add / Remove</a>
      </div>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
